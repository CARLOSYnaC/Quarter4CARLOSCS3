<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Ratings</title>
  <link rel="stylesheet" href="styles.css" />
</head>
  
<body>
  <h1>Movies and Ratings</h1>

  <form id="moviesForm">
    <label for="key">Movie Key</label>
    <input type="text" id="key" required>

    <label for="movie">Movie Name</label>
    <input type="text" id="movie" required>

    <label for="year">Year</label>
    <input type="number" id="year" required>

   <select name="genre" id="genre">
  <option value="idk">Not Sure</option>
  <option value="horror">Horror</option>
  <option value="rom">Comedy</option>
  <option value="act">Action</option>
  <option value="sci">Sci-Fi</option>
</select>

<label>Rating</label>
<div class="star-rating">
  <input type="radio" name="rating" id="star5" value="5"><label for="star5">★</label>
  <input type="radio" name="rating" id="star4" value="4"><label for="star4">★</label>
  <input type="radio" name="rating" id="star3" value="3"><label for="star3">★</label>
  <input type="radio" name="rating" id="star2" value="2"><label for="star2">★</label>
  <input type="radio" name="rating" id="star1" value="1"><label for="star1">★</label>
</div>

    <button type="submit">Rate A Movie!</button>
  </form>

  <div class="movierating-list" id="movieList"></div>
  

  <script src="script.js">
    
  </script>
</body>
